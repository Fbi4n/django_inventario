services:

  web:

    build: .
    restart: always

    command: python manage.py runserver 0.0.0.0:8000

    volumes:
      - .:/app

    ports:
      - "8000:8000"

    depends_on:
      - db

    environment:
      DB_NAME: inventario_db
      DB_USER: root
      DB_PASSWORD: root123
      DB_HOST: db
      DB_PORT: 3306

  db:

    image: mysql:8

    restart: always

    environment:
      MYSQL_DATABASE: inventario_db
      MYSQL_ROOT_PASSWORD: root123

    ports:
      - "3307:3306"