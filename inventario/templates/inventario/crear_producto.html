{% extends 'inventario/base.html' %}

    {% block content %}
    

    <h1 class="mb-4 display-5 fw-bold text-primary">Agregar Producto</h1>

    <form method="POST" class="shadow-sm p-4 mb-5 bg-white rounded border">
        {% csrf_token %}

        <div class="mb-3 text-secondary">
            {{ form.as_p }}
        </div>

        <div class="d-flex gap-3 justify-content-center">
            <button type='submit' class="btn btn-primary btn-lg px-5 shadow-sm">
                GUARDAR
            </button>
            <a href='/productos/' class="btn btn-secondary btn-lg px-5 shadow-sm">
                SALIR
            </a>
        </div>

    </form>

    {% endblock content %}
