{% extends 'inventario/base.html' %}

    {% block content %}


    <h1 class="mb-4">Lista de Productos</h1><br>
        <a href="/producto/crear/" class="btn btn-success mb-3">
            NUEVO PRODUCTO
        </a>

    <table class="table table-bordered">
        <thead>
            <tr>
                <th>Nombre</th>
                <th>Precio</th>
                <th>Stock</th>
                <th>ACCIONES</th>
            </tr>
        </thead>
        <tbody>
            {% for producto in productos %}

                <tr>
                    <td>{{ producto.nombre }}</td>
                    <td>{{ producto.precio }}</td>
                    <td>{{ producto.stock}}</td>
                    <td>
                        <div class="d-flex gap-2">
                            <a href="/productos/{{ producto.id }}/editar" class="btn btn-warning btn-sm">
                            EDITAR
                            </a>
                            <a href="/productos/{{ producto.id }}/eliminar/" class="btn btn-danger btn-sm">
                            ELIMINAR
                            </a>
                        </div>
                    </td>
                    
                </tr>
            {% endfor %}
        </tbody>
    </table>
    
    {% endblock content %}
