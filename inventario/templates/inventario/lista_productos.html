<!DOCTYPE html>
<html lang="es">
<head>
    <title>Productos</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class=container mt-5>
    <h1 class="mb-4">Lista de Productos</h1><br>
        <a href="/producto/crear/" class="btn btn-success mb-3">
            NUEVO PRODUCTO
        </a>

    <table class="table table-bordered">
        <thead>
            <tr>
                <th>Nombre</th>
                <th>Precio</th>
                <th>Stock</th>
                <th>ACCIONES</th>
            </tr>
        </thead>
        <tbody>
            {% for producto in productos %}

                <tr>
                    <td>{{ producto.nombre }}</td>
                    <td>{{ producto.precio }}</td>
                    <td>{{ producto.stock}}</td>
                    <td>
                        <a href="/productos/{{ producto.id }}/editar" class="btn btn-warning btn-sm">
                        EDITAR
                        </a>
                    </td>
                    
                </tr>
            {% endfor %}
        </tbody>
    </table>

</body>
</html>
